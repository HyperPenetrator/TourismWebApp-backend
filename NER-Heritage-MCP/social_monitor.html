<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot@NE | Social Engagement Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-emerald-500/20 pb-6">
            <div>
                <h1 class="text-2xl font-bold text-emerald-500 tracking-tighter neon-glow">SPOT@NE // SOCIAL_MONITOR_v1.0</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] mt-1">Real-time Engagement Stream / Port 8001</p>
            </div>
            <div id="status" class="px-3 py-1 rounded-full border border-red-500/30 bg-red-500/10 text-red-500 text-[10px] font-bold tracking-widest uppercase animate-pulse">
                Disconnected
            </div>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Connection Panel -->
            <div class="md:col-span-1 space-y-6">
                <div class="glass p-6 rounded-2xl">
                    <h3 class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-4">Command Center</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] text-slate-500 uppercase mb-2">Target Post ID</label>
                            <input type="text" id="postId" value="post_test" class="w-full bg-slate-900/50 border border-slate-800 rounded-lg px-3 py-2 text-sm focus:border-emerald-500/50 outline-none transition-all">
                        </div>
                        <button id="connectBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded-lg text-xs tracking-widest uppercase transition-all">
                            Initialize Stream
                        </button>
                    </div>
                </div>

                <div class="glass p-6 rounded-2xl border-emerald-500/20">
                    <h3 class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-4">System Stats</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px]">
                            <span class="text-slate-500">PACKETS_RCVD</span>
                            <span id="packetCount" class="text-emerald-400">0</span>
                        </div>
                        <div class="flex justify-between text-[10px]">
                            <span class="text-slate-500">LATENCY_EST</span>
                            <span class="text-emerald-400">< 2ms</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Feed Panel -->
            <div class="md:col-span-2">
                <div class="glass rounded-2xl overflow-hidden flex flex-col h-[600px]">
                    <div class="bg-slate-900/50 px-6 py-3 border-b border-white/5 flex justify-between items-center">
                        <span class="text-[10px] font-bold uppercase tracking-widest">Live Decryption Stream</span>
                        <div class="flex gap-1">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <div class="w-2 h-2 rounded-full bg-emerald-500/20"></div>
                        </div>
                    </div>
                    <div id="feed" class="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-hide">
                        <div class="text-slate-500 text-[10px] italic">Waiting for connection...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let ws = null;
        let count = 0;
        const feed = document.getElementById('feed');
        const status = document.getElementById('status');
        const connectBtn = document.getElementById('connectBtn');
        const postIdInput = document.getElementById('postId');
        const packetCount = document.getElementById('packetCount');

        function addLog(type, data) {
            count++;
            packetCount.innerText = count;
            
            const entry = document.createElement('div');
            entry.className = 'animate-in fade-in slide-in-from-left-4 duration-500 border-l-2 border-emerald-500/30 pl-4 py-2 bg-emerald-500/5 rounded-r-lg';
            
            let content = '';
            if (type === 'NEW_COMMENT') {
                content = `<span class="text-emerald-500 font-bold">COMMENT_RCVD</span> <span class="text-slate-500 ml-2">@${data.user}</span><br><p class="text-sm mt-1 text-slate-200">"${data.text}"</p>`;
            } else if (type === 'NEW_LIKE') {
                content = `<span class="text-pink-500 font-bold">LIKE_RCVD</span> <span class="text-slate-500 ml-2">@${data.user} has deployed interest</span>`;
            } else if (type === 'NEW_RESHARE') {
                content = `<span class="text-blue-500 font-bold">SHARE_RCVD</span> <span class="text-slate-500 ml-2">@${data.user} is propagating target</span>`;
            }

            entry.innerHTML = `<div class="text-[9px] text-slate-600 mb-1">${new Date().toLocaleTimeString()} // ID: ${Math.random().toString(36).substr(2, 9)}</div>${content}`;
            
            feed.prepend(entry);
        }

        connectBtn.onclick = () => {
            if (ws) ws.close();
            
            const postId = postIdInput.value;
            ws = new WebSocket(`ws://localhost:8001/ws/engagement/${postId}`);
            
            ws.onopen = () => {
                status.innerText = 'Connected / Live';
                status.className = 'px-3 py-1 rounded-full border border-emerald-500/30 bg-emerald-500/10 text-emerald-500 text-[10px] font-bold tracking-widest uppercase';
                feed.innerHTML = `<div class="text-emerald-500/50 text-[10px] uppercase tracking-widest mb-4 border-b border-emerald-500/10 pb-2">Stream established: Room ${postId}</div>`;
                connectBtn.innerText = 'Re-Initialize';
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                addLog(msg.type, msg.data);
            };

            ws.onclose = () => {
                status.innerText = 'Disconnected';
                status.className = 'px-3 py-1 rounded-full border border-red-500/30 bg-red-500/10 text-red-500 text-[10px] font-bold tracking-widest uppercase animate-pulse';
            };
        };
    </script>
</body>
</html>
